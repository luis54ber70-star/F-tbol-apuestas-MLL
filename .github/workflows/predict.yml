name: Auto-Predict Liga MX
on:
  schedule:
    - cron: '0 13,19,1 * * *' # 7am, 1pm, 7pm CDMX
  workflow_dispatch:

jobs:
  predict:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.12', cache: 'pip'}
      - run: pip install pandas requests scikit-learn xgboost joblib
      - name: Run predictions
        env:
          API_KEY: ${{ secrets.API_FOOTBALL_KEY }}
        run: python src/predict.py
      - name: Commit predictions
        run: |
          git config user.name github-actions
          git add predictions/
          git diff --quiet || git commit -m "Picks auto $(date -u +'%Y-%m-%d %H:%M')"
          git push
